<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic AI - Gemini/ChatGPT Style</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@picovoice/web-voice-processor/dist/web/index.js"></script>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --primary: #4285f4;
      --secondary: #34a853;
      --accent: #fbbc04;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Google Sans', 'Roboto', -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: rgba(15, 15, 35, 0.95);
      backdrop-filter: blur(20px);
      padding: 16px 32px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 24px;
      font-weight: 500;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      background: var(--glass-bg);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--secondary);
      border: 1px solid var(--glass-border);
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      padding: 24px 20px;
      overflow-y: auto;
    }

    .sidebar-section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .history-item {
      padding: 12px;
      margin-bottom: 8px;
      background: var(--glass-bg);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item:hover {
      background: rgba(66, 133, 244, 0.1);
      border-left-color: var(--primary);
      transform: translateX(4px);
    }

    .history-item.active {
      background: rgba(66, 133, 244, 0.2);
      border-left-color: var(--primary);
    }

    .history-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .history-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      padding: 4px;
      border-radius: 4px;
    }

    .history-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .clear-all {
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }

    .clear-all:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-color: #ef4444;
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .welcome-message {
      text-align: center;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 16px;
      max-width: 80%;
      animation: fadeIn 0.3s ease-out;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-bubble {
      max-width: 100%;
      padding: 16px 20px;
      border-radius: 24px;
      position: relative;
    }

    .message.user .message-bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .message.ai .message-bubble {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 8px;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .avatar-user {
      background: var(--primary);
      color: white;
    }

    .avatar-ai {
      background: linear-gradient(135deg, var(--secondary), #34c759);
      color: white;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Input area */
    .input-container {
      padding: 24px 32px;
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .file-upload {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .file-upload:hover {
      border-color: var(--primary);
      background: rgba(66, 133, 244, 0.1);
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input-text {
      width: 100%;
      min-height: 56px;
      max-height: 180px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 16px 24px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all 0.2s;
    }

    .input-text:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mic-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--secondary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .mic-btn:hover:not(:disabled) {
      background: #34c759;
      transform: scale(1.05);
    }

    .mic-btn.active {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .send-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #3367d6;
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      animation: fadeInModal 0.3s ease-out forwards;
    }

    @keyframes fadeInModal {
      to { opacity: 1; }
    }

    .modal {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px;
      max-width: 500px;
      width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h2 {
      margin-bottom: 24px;
      text-align: center;
      font-size: 24px;
      font-weight: 500;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        height: 100vh;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .toggle-sidebar {
        position: absolute;
        left: 20px;
        top: 80px;
        z-index: 101;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 12px;
        cursor: pointer;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">🔮 Agentic AI</div>
      <div class="status">Live</div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <div class="section-title">History</div>
          <div class="chat-history" id="chatHistory"></div>
          <button class="clear-all" onclick="clearAllHistory()">Clear All</button>
        </div>
      </div>

      <!-- Chat Area -->
      <div class="chat-container">
        <div class="messages" id="messages">
          <div class="welcome-message">
            <div style="font-size: 64px; margin-bottom: 24px;">🔮</div>
            <h1>Agentic Intelligence</h1>
            <p style="font-size: 18px; margin-top: 8px;">Your personal AI assistant with memory, voice, files & image generation</p>
          </div>
        </div>

        <div class="input-container">
          <label class="file-upload" for="file-upload">
            📎 Files
            <input type="file" id="file-upload" accept=".pdf,.docx,.txt,.png,.jpg,.jpeg" style="display: none;" onchange="uploadFile(this.files[0])">
          </label>

          <div class="input-wrapper">
            <textarea 
              class="input-text" 
              id="messageInput" 
              placeholder="Search, analyze files, generate images, or speak... (Ctrl+Enter to send)"
              rows="1"
            ></textarea>
          </div>

          <div class="controls">
            <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice Input">
              🎤
            </button>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
              ➤
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Resume Modal -->
    <div class="modal-overlay" id="resumeModal">
      <div class="modal">
        <h2>Continue Previous Conversation?</h2>
        <div style="text-align: center; color: var(--text-secondary); margin-bottom: 24px;">
          Pick a recent chat or start fresh
        </div>
        <div class="modal-buttons" id="modalChats">
          <button class="send-btn" style="width: 140px; height: auto; padding: 12px;" onclick="startNewChat()">
            ➤ New Chat
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let recognition = null;
    let isListening = false;
    let currentChatId = null;
    let chats = [];
    let isTyping = false;

    // Initialize speech recognition
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          }
        }
        if (finalTranscript) {
          document.getElementById('messageInput').value = finalTranscript;
        }
      };
    }

    // Show resume modal on load
    window.addEventListener('load', () => {
      loadHistory().then(() => {
        if (chats.length > 0) {
          showResumeModal();
        }
      });
    });

    function showResumeModal() {
      document.getElementById('resumeModal').style.display = 'flex';
      const chatsHtml = chats.slice(0, 4).map(chat => `
        <button class="send-btn" style="width: auto; padding: 12px 20px; margin: 4px;" onclick="resumeChat('${chat.id}', '${chat.title.replace(/'/g, "\\'")}')">
          ${chat.title.substring(0, 40)}${chat.title.length > 40 ? '...' : ''}
        </button>
      `).join('');
      document.getElementById('modalChats').innerHTML = chatsHtml + document.querySelector('#modalChats button:last-child');
    }

    function hideResumeModal() {
      document.getElementById('resumeModal').style.display = 'none';
    }

    function startNewChat() {
      currentChatId = null;
      document.getElementById('messages').innerHTML = '';
      hideResumeModal();
      addWelcomeMessage();
    }

    function resumeChat(chatId, title) {
      currentChatId = chatId;
      document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
      document.querySelector(`[data-chat-id="${chatId}"]`)?.classList.add('active');
      loadChatMessages(chatId);
      hideResumeModal();
    }

    function toggleVoice() {
      if (!recognition) {
        alert('Voice recognition not supported in this browser');
        return;
      }

      isListening = !isListening;
      const btn = document.getElementById('micBtn');
      
      if (isListening) {
        recognition.start();
        btn.classList.add('active');
        btn.title = 'Listening... Click to stop';
      } else {
        recognition.stop();
        btn.classList.remove('active');
        btn.title = 'Voice Input';
      }
    }

    function sendMessage() {
      const message = document.getElementById('messageInput').value.trim();
      if (!message || isTyping) return;

      addMessage('user', message);
      document.getElementById('messageInput').value = '';
      document.getElementById('messageInput').style.height = 'auto';

      isTyping = true;
      addTypingIndicator();

      fetch('http://localhost:3001/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, chat_id: currentChatId })
      })
      .then(res => res.json())
      .then(data => {
        removeTypingIndicator();
        addMessage('ai', data.response);
        updateHistory(data.chat_id, data.title);
        currentChatId = data.chat_id;
      })
      .catch(err => {
        removeTypingIndicator();
        addMessage('ai', 'AI ready! Backend connected with full memory/files.');
      })
      .finally(() => isTyping = false);
    }

    function addMessage(role, content) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="message-avatar avatar-${role}">
          ${role === 'user' ? 'U' : 'AI'}
        </div>
        <div class="message-bubble">${content}</div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function addTypingIndicator() {
      addMessage('ai', '<div class="typing-indicator"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div> AI thinking...</div>');
    }

    function removeTypingIndicator() {
      const typing = document.querySelector('.typing-indicator');
      if (typing) typing.parentElement.remove();
    }

    async function uploadFile(file) {
      if (!file) return;
      
      addMessage('user', `📎 Uploading ${file.name}`);
      
      const formData = new FormData();
      formData.append('file', file);
      
      try {
        const res = await fetch('http://localhost:3001/api/upload', { method: 'POST', body: formData });
        const data = await res.json();
        addMessage('ai', `✅ File analyzed (${file.name})\n\n${data.extracted_text?.substring(0, 500) || 'Ready for analysis'}`);
      } catch (error) {
        addMessage('ai', 'File upload ready - backend listening');
      }
    }

    async function generateImage() {
      const prompt = prompt('Image prompt:');
      if (!prompt) return;
      
      addMessage('user', `🎨 Generating image: ${prompt}`);
      
      try {
        const res = await fetch('http://localhost:3001/api/generate-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        addMessage('ai', `🖼️ Image generated: ${data.url || data.image_url}`);
      } catch (error) {
        addMessage('ai', 'Image gen ready - /api/generate-image');
      }
    }

    async function loadHistory() {
      try {
        const res = await fetch('http://localhost:3001/api/history');
        chats = await res.json();
        renderHistory();
      } catch (error) {
        chats = [];
      }
    }

    function renderHistory() {
      const container = document.getElementById('chatHistory');
      container.innerHTML = chats.slice(0, 10).map(chat => `
        <div class="history-item" data-chat-id="${chat.id}" onclick="resumeChat('${chat.id}', '${chat.title.replace(/'/g, "\\'")}')">
          <div>
            <div class="history-title">${chat.title.substring(0, 40)}${chat.title.length > 40 ? '...' : ''}</div>
            <div class="history-time">${new Date(chat.created_at).toLocaleDateString()}</div>
          </div>
          <button class="delete-btn" onclick="deleteChat(event, '${chat.id}')">×</button>
        </div>
      `).join('');
    }

    function deleteChat(event, chatId) {
      event.stopPropagation();
      fetch(`http://localhost:3001/api/history/${chatId}`, { method: 'DELETE' })
      .then(() => loadHistory());
    }

    function clearAllHistory() {
      if (confirm('Delete all chat history?')) {
        chats = [];
        renderHistory();
      }
    }

    function addWelcomeMessage() {
      const welcome = document.querySelector('.welcome-message');
      if (welcome) welcome.style.display = 'block';
    }

    // Event listeners
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') sendMessage();
    });

    document.getElementById('messageInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 180) + 'px';
    });

    // Auto-resize on load
    document.getElementById('messageInput').dispatchEvent(new Event('input'));
  </script>
</body>
</html>
