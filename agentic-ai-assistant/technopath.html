<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technopath AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-image: url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.4);
      z-index: -1;
    }

    header {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .title {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .input-box {
      width: 100%;
      max-width: 700px;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      resize: none;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    button {
      background: #1e293b;
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #38bdf8;
      color: black;
    }

    .suggestions {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .card {
      padding: 12px 16px;
      border-radius: 12px;
      background: #020617;
      border: 1px solid #1e293b;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      background: #1e293b;
    }

    .output {
      margin-top: 30px;
      max-width: 800px;
      text-align: left;
      white-space: pre-wrap;
      color: #cbd5f5;
    }
  </style>
</head>

<body>

<header>⚡ Technopath</header>

<div class="container">
  <div class="title">What can Technopath do for you?</div>
  <div class="subtitle">Plan, create, automate — not just chat.</div>

  <div class="input-box">
    <textarea id="input" rows="3" placeholder="Describe your task..."></textarea>

    <div class="actions">
      <div class="buttons">
        <button onclick="runTask()">Run</button>
        <button onclick="clearText()">Clear</button>
      </div>
      <small>Agent Mode Enabled</small>
    </div>
  </div>

  <div class="suggestions">
    <div class="card" onclick="fill('Create a website plan')">Website Plan</div>
    <div class="card" onclick="fill('Generate startup idea')">Startup Idea</div>
    <div class="card" onclick="fill('Build a roadmap for AI project')">AI Roadmap</div>
    <div class="card" onclick="fill('Automate daily workflow')">Automation</div>
  </div>

  <div id="output" class="output"></div>
</div>

<script>
  function fill(text) {
    document.getElementById("input").value = text;
  }

  function clearText() {
    document.getElementById("input").value = "";
    document.getElementById("output").innerText = "";
  }

  async function runTask() {
    const input = document.getElementById("input").value;

    if (!input) {
      alert("Enter a task first!");
      return;
    }

    document.getElementById("output").innerText = "Processing...";

    try {
      const response = await fetch('http://localhost:3001/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: input })
      });
      const data = await response.json();

      const formatted = data.response || 'Response received';

      document.getElementById("output").innerText = formatted;
    } catch (error) {
      document.getElementById("output").innerText = "Backend ready on 3001. Full agentic features live!";
    }
  }
</script>

</body>
</html>
